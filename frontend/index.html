<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Anti-flicker: apply stored theme BEFORE React loads. Light is the default — no OS fallback. -->
    <script>
      (function () {
        try {
          if (localStorage.getItem("postra-theme") === "dark") {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Postra — Stop Overthinking. Start Posting.</title>

    <link rel="icon" type="image/png" href="/postra-logo.png" />

    <meta name="description" content="Postra is an AI-powered content system for Instagram creators. Generate ideas, hooks, scripts, captions, and post consistently without overthinking." />
    <meta name="keywords" content="Postra, Instagram AI tool, content creation, reels ideas, captions generator, creator tools" />
    <meta name="author" content="Parth Sharma" />

    <meta property="og:title" content="Postra — Stop Overthinking. Start Posting." />
    <meta property="og:description" content="Go from idea to post in minutes with AI. Scripts, hooks, captions, hashtags — all in one flow." />
    <meta property="og:image" content="/postra-logo.png" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Postra — AI for Instagram creators" />
    <meta name="twitter:description" content="Create content faster with AI. Ideas, scripts, captions — all in one place." />
    <meta name="twitter:image" content="/postra-logo.png" />
  </head>
  <body>
    <div id="loader" style="display:flex;justify-content:center;align-items:center;height:100vh;">
      <img src="/postra-logo.png" style="width:80px;" />
    </div>

    <div id="root"></div>

    <script type="module" src="src/main.tsx"></script>

    <script>
      const observer = new MutationObserver(() => {
        if (document.getElementById("root").children.length > 0) {
          document.getElementById("loader").style.display = "none";
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById("root"), { childList: true });
    </script>
  </body>
</html>
